<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Orange background circle -->
  <circle cx="256" cy="256" r="256" fill="#E8651A"/>

  <!-- ISA wheelchair symbol, centered, scaled to fill with padding -->
  <!-- Translated and scaled to center in 512x512 with ~10% padding -->
  <g transform="translate(106, 72) scale(3.0)">

    <!-- Head -->
    <circle cx="50" cy="16" r="11" fill="#000000"/>

    <!-- Upper body / torso -->
    <path d="M50 30 L50 72" stroke="#000000" stroke-width="10" stroke-linecap="round"/>

    <!-- Left arm reaching forward -->
    <path d="M50 45 L82 45" stroke="#000000" stroke-width="10" stroke-linecap="round"/>

    <!-- Seat / thigh -->
    <path d="M50 72 L80 72" stroke="#000000" stroke-width="10" stroke-linecap="round"/>

    <!-- Lower leg -->
    <path d="M80 72 L80 98" stroke="#000000" stroke-width="10" stroke-linecap="round"/>

    <!-- Large rear wheel -->
    <circle cx="46" cy="104" r="28" fill="none" stroke="#000000" stroke-width="10"/>

    <!-- Small front wheel -->
    <circle cx="84" cy="104" r="12" fill="none" stroke="#000000" stroke-width="8"/>

    <!-- Wheel push handle -->
    <path d="M18 76 L18 104" stroke="#000000" stroke-width="8" stroke-linecap="round"/>

  </g>
</svg>
